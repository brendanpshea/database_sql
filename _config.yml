title: SQL and Database Management Through Pop Culture
author: Brendan Shea, PhD
copyright: "2026"
logo: database_cover.jpg

execute:
  execute_notebooks: auto
  timeout: 900
  exclude_patterns:
    - Database_09_PokemonAndPostgres.ipynb
    - Database_10_DatabaseSecurity.ipynb

parse:
  myst_enable_extensions:
    - colon_fence

html:
  use_issues_button: false
  use_repository_button: true
  use_edit_page_button: false
  extra_navbar: >-
    Supported with grant funding from Minnesota State and Rochester Community and Technical College.

sphinx:
  config:
    exclude_patterns:
      - _build
      - _build/**
      - .venv
      - .venv/**
      - README.md
      - Chapter_0_Brendan's_Intro_to_Colab.ipynb
      - data/GenerateToadCityFirewall.ipynb
      - data/GothamCityBank_Generator.ipynb
      - data/MarioBrosPlumbing.ipynb
      - data/Spotify_Music.ipynb
      - sql_ddl_quiz/README.md
      - sql_select_quiz/README.md
    suppress_warnings:
      - misc.highlighting_failure
    html_static_path:
      - _static
    html_css_files:
      - custom.css
    html_js_files:
      - sandbox-html-output.js

repository:
  url: https://github.com/brendanpshea/database_sql
  branch: main
  path_to_book: .

launch_buttons:
  colab_url: https://colab.research.google.com
  notebook_interface: classic
